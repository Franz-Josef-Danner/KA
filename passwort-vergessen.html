<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Passwort vergessen - KA System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1>Passwort vergessen</h1>
      <p class="login-subtitle">Geben Sie Ihre E-Mail-Adresse ein. Sie erhalten einen Link zum Zurücksetzen Ihres Passworts.</p>

      <form id="forgotForm" class="login-form">
        <div class="form-group">
          <label for="email">E-Mail-Adresse</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="ihre@email.com"
            autocomplete="email"
          />
        </div>

        <div id="errorMessage" class="error-message" style="display: none;"></div>
        <div id="successMessage" class="message success-message" style="display: none;"></div>

        <button type="submit" class="login-btn" id="submitBtn">Link anfordern</button>
      </form>

      <p style="text-align: center; margin-top: 20px; font-size: 14px;">
        <a href="index.html" style="color: #667eea; text-decoration: none;">← Zurück zur Anmeldung</a>
      </p>
    </div>
  </div>

  <script type="module">
    const form          = document.getElementById('forgotForm');
    const errorMessage  = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    const submitBtn     = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      errorMessage.style.display  = 'none';
      successMessage.style.display = 'none';

      const email = document.getElementById('email').value.trim();

      submitBtn.disabled    = true;
      submitBtn.textContent = 'Wird gesendet…';

      try {
        const response = await fetch('./api/request-password-reset.php', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });

        const result = await response.json();

        if (result.success) {
          successMessage.textContent = result.message ||
            'Falls eine E-Mail-Adresse mit diesem Konto verknüpft ist, wurde eine E-Mail mit einem Zurücksetzen-Link versendet.';
          successMessage.style.display = 'block';
          form.reset();
        } else {
          errorMessage.textContent = result.error || 'Ein Fehler ist aufgetreten.';
          errorMessage.style.display = 'block';
        }
      } catch (err) {
        errorMessage.textContent = 'Verbindungsfehler. Bitte versuchen Sie es später erneut.';
        errorMessage.style.display = 'block';
      } finally {
        submitBtn.disabled    = false;
        submitBtn.textContent = 'Link anfordern';
      }
    });
  </script>
</body>
</html>
