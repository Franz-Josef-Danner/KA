<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Bearbeiten</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .group { border: 1px solid #ccc; padding: 10px; margin-bottom: 20px; }
        label { display: block; margin-top: 8px; }
        input[type=text], textarea { width: 100%; }
    </style>
</head>
<body>
    <h1>Bearbeiten</h1>
    <div class="group">
        <h2>Firmendaten</h2>
        <label for="firma">Firma</label>
        <input type="text" id="firma" />

        <label for="adresse">Adresse</label>
        <input type="text" id="adresse" />

        <label for="inhaber">Inhaber</label>
        <input type="text" id="inhaber" />

        <label for="telefon">Telefon</label>
        <input type="text" id="telefon" />

        <label for="email">Email</label>
        <input type="text" id="email" />

        <label for="land">Land</label>
        <input type="text" id="land" />

        <label for="bundesland">Bundesland</label>
        <input type="text" id="bundesland" />

        <label for="bezirk">Bezirk</label>
        <input type="text" id="bezirk" />

        <label for="ort">Ort</label>
        <input type="text" id="ort" />
    </div>

    <div class="group">
        <h2>Status</h2>
        <label><input type="checkbox" id="offen" /> Offen</label>
        <label><input type="checkbox" id="ersteMail" /> Erste Mail</label>
        <label><input type="checkbox" id="erstGespr" /> Erstgespräch</label>
        <label><input type="checkbox" id="buehne" /> Bühne</label>
        <label><input type="checkbox" id="nein" /> Nein</label>
        <label><input type="checkbox" id="zuNahe" /> Zu nahe</label>
    </div>

    <div class="group">
        <h2>Erstgespräch</h2>
        <label for="terminDatum">Datum</label>
        <input type="date" id="terminDatum" />

        <label for="zeit">Uhrzeit</label>
        <input type="text" id="zeit" placeholder="HH:mm" />

        <label for="termin">Termin</label>
        <input type="text" id="termin" readonly />
    </div>

    <div class="group">
        <h2>Kommentar</h2>
        <textarea id="kommentar" rows="5"></textarea>
    </div>

    <div class="group">
        <h2>Bewertung</h2>
        <label><input type="checkbox" id="s1" /> S1</label>
        <label><input type="checkbox" id="s2" /> S2</label>
        <label><input type="checkbox" id="s3" /> S3</label>
        <label><input type="checkbox" id="s4" /> S4</label>
        <label><input type="checkbox" id="s5" /> S5</label>
    </div>

    <div class="group">
        <button id="mapsBtn">Web Suche</button>
        <button id="teleBtn">Tele Termin</button>
        <button id="mailBtn">Mail senden</button>
        <button id="terminFixBtn">Termin fixieren</button>
        <button id="okBtn">OK</button>
        <button id="abbrechenBtn">Abbrechen</button>
    </div>

    <script src="Script1.js"></script>
</body>
</html>
