<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Vorsch</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .row { margin-bottom: 10px; }
        label { display: inline-block; width: 100px; }
        input[type=text], select { width: 200px; }
        textarea { width: 300px; height: 80px; margin-right: 10px; }
        #map { width: 100%; height: 400px; border: 1px solid #ccc; margin-bottom: 10px; }
        #ProgressBar { width: 100%; height: 20px; border: 1px solid #ccc; }
        #ProgressBarInner { height: 100%; width: 0; background-color: green; }
    </style>
</head>
<body>
    <div class="row">
        <label for="LokationBox">Lokation</label>
        <input type="text" id="LokationBox">
    </div>
    <div class="row">
        <label for="DatumBox">Datum</label>
        <input type="text" id="DatumBox">
        <label for="ZeitBox" style="margin-left:10px;">Uhrzeit</label>
        <input type="text" id="ZeitBox">
    </div>
    <div class="row">
        <label for="StueckeListBox">Stücke</label>
        <select id="StueckeListBox"></select>
    </div>
    <div class="row">
        <label for="RegieBox">Regie</label>
        <select id="RegieBox"></select>
    </div>
    <div class="row">
        <label>Rollen</label>
        <select id="RolleCombo1"></select>
        <select id="RolleCombo2"></select>
        <select id="RolleCombo3"></select>
        <select id="RolleCombo4"></select>
        <select id="RolleCombo5"></select>
        <select id="RolleCombo6"></select>
    </div>
    <div class="row">
        <label>Mitfahrer</label>
        <select id="MitfahrCombo1"></select>
        <select id="MitfahrCombo2"></select>
        <select id="MitfahrCombo3"></select>
        <select id="MitfahrCombo4"></select>
        <select id="MitfahrCombo5"></select>
        <select id="MitfahrCombo6"></select>
        <select id="MitfahrCombo7"></select>
    </div>
    <div class="row">
        <label>Fahrer</label>
        <label><input type="checkbox" id="Fahrer1">1</label>
        <label><input type="checkbox" id="Fahrer2">2</label>
        <label><input type="checkbox" id="Fahrer3">3</label>
        <label><input type="checkbox" id="Fahrer4">4</label>
        <label><input type="checkbox" id="Fahrer5">5</label>
        <label><input type="checkbox" id="Fahrer6">6</label>
    </div>
    <div id="map"></div>
    <div class="row">
        <button id="Checkbutton">Check</button>
        <button id="OKbutton">OK</button>
        <button id="Abbrechenbutton">Abbrechen</button>
        <button id="NeuAnf">Neu Anfragen</button>
    </div>
    <div class="row">
        <textarea id="TestBox1"></textarea>
        <textarea id="TestBox2"></textarea>
        <textarea id="TestBox3"></textarea>
    </div>
    <div class="row">
        <textarea id="TestBox4"></textarea>
        <textarea id="TestBox5"></textarea>
        <textarea id="TestBox6"></textarea>
    </div>
    <div class="row" id="ProgressBar">
        <div id="ProgressBarInner"></div>
    </div>
    <div class="row">
        <span id="InfoLabel">Progress</span>
    </div>
    <script src="Vorsch.js"></script>
</body>
</html>
