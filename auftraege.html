<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aufträge - KA System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="nav-container"></div>
  
  <h1>Aufträge – Verwaltung</h1>

  <div class="bar">
    <button id="newOrderBtn">+ Neuer Auftrag</button>
    <button id="undoBtn" title="Rückgängig (Strg+Z)">↶ Rückgängig</button>
    <button id="redoBtn" title="Wiederholen (Strg+Y)">↷ Wiederholen</button>
    <input id="search" class="search" type="search" placeholder="Suchen (Auftrags-ID, Firma, Beschreibung, Status …)" />
  </div>

  <div class="hint">
    Bedienung: Doppelklick auf einen Auftrag zum Bearbeiten. <span class="pill">Tab</span> springt zum nächsten Feld im Bearbeitungsdialog.
  </div>

  <div class="wrap">
    <table id="grid">
      <thead>
        <tr>
          <th>Auftrags_ID</th>
          <th>Auftragsdatum</th>
          <th>Firma</th>
          <th>Ansprechpartner</th>
          <th>Beschreibung</th>
          <th>Budget</th>
          <th>Status</th>
          <th>Fälligkeit</th>
          <th>Kommentare</th>
          <th class="actions">Aktion</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <!-- Order Edit Modal -->
  <div id="orderModal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Auftrag bearbeiten</h2>
        <button id="modalClose" class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <form id="orderForm">
          <div class="form-group">
            <label for="edit_Auftrags_ID">Auftrags-ID:</label>
            <input type="text" id="edit_Auftrags_ID" name="Auftrags_ID" required />
          </div>
          <div class="form-group">
            <label for="edit_Auftragsdatum">Auftragsdatum:</label>
            <input type="date" id="edit_Auftragsdatum" name="Auftragsdatum" />
          </div>
          <div class="form-group">
            <label for="edit_Firma">Firma:</label>
            <input type="text" id="edit_Firma" name="Firma" />
          </div>
          <div class="form-group">
            <label for="edit_Ansprechpartner">Ansprechpartner:</label>
            <input type="text" id="edit_Ansprechpartner" name="Ansprechpartner" />
          </div>
          <div class="form-group">
            <label for="edit_Beschreibung">Beschreibung:</label>
            <textarea id="edit_Beschreibung" name="Beschreibung" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="edit_Budget">Budget:</label>
            <input type="text" id="edit_Budget" name="Budget" />
          </div>
          <div class="form-group">
            <label for="edit_Status">Status:</label>
            <select id="edit_Status" name="Status">
              <option value="offen">offen</option>
              <option value="in Bearbeitung">in Bearbeitung</option>
              <option value="abgeschlossen">abgeschlossen</option>
              <option value="storniert">storniert</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit_Fälligkeit">Fälligkeit:</label>
            <input type="date" id="edit_Fälligkeit" name="Fälligkeit" />
          </div>
          <div class="form-group">
            <label for="edit_Kommentare">Kommentare:</label>
            <textarea id="edit_Kommentare" name="Kommentare" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button id="modalCancel" class="btn-secondary">Abbrechen</button>
        <button id="modalSave" class="btn-primary">Speichern</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from './js/modules/auth.js';
    import { initNavigation } from './js/modules/navigation.js';
    
    (() => {
      try {
        // Require authentication; if this fails or redirects, do not continue
        requireAuth();

        // Initialize navigation only after successful authentication
        initNavigation('auftraege.html');
      } catch (error) {
        // Authentication failed or a redirect is in progress; avoid further DOM manipulation
        console.error('Authentication error on auftraege page:', error);
      }
    })();
  </script>
  <script type="module" src="js/auftraege-app.js"></script>
</body>
</html>
