<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aufträge - KA System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="nav-container"></div>
  
  <h1>Aufträge – Verwaltung</h1>

  <div class="bar">
    <button id="newOrderBtn">+ Neuer Auftrag</button>
    <button id="undoBtn" title="Rückgängig (Strg+Z)">↶ Rückgängig</button>
    <button id="redoBtn" title="Wiederholen (Strg+Y)">↷ Wiederholen</button>
    <button id="saveBtn">Speichern</button>
    <button id="exportBtn">CSV Export</button>
    <label for="importFile" class="import-btn">CSV Import</label>
    <input type="file" id="importFile" accept=".csv" style="display: none;" />
    <input id="search" class="search" type="search" placeholder="Suchen (Auftrags-ID, Firma, Beschreibung, Status …)" />
    <span class="small">Autosave beim Speichern/Import.</span>
  </div>

  <div class="hint">
    Bedienung: Zellen anklicken und direkt tippen. <span class="pill">Tab</span> springt zur nächsten Zelle.
  </div>

  <div class="wrap">
    <table id="grid">
      <thead>
        <tr>
          <th>Auftrags_ID</th>
          <th>Auftragsdatum</th>
          <th>Firma</th>
          <th>Ansprechpartner</th>
          <th>Beschreibung</th>
          <th>Budget</th>
          <th>Status</th>
          <th>Fälligkeit</th>
          <th>Kommentare</th>
          <th class="actions">Aktion</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <script type="module">
    import { requireAuth } from './js/modules/auth.js';
    import { initNavigation } from './js/modules/navigation.js';
    
    (() => {
      try {
        // Require authentication; if this fails or redirects, do not continue
        requireAuth();

        // Initialize navigation only after successful authentication
        initNavigation('auftraege.html');
      } catch (error) {
        // Authentication failed or a redirect is in progress; avoid further DOM manipulation
        console.error('Authentication error on auftraege page:', error);
      }
    })();
  </script>
  <script type="module" src="js/auftraege-app.js"></script>
</body>
</html>
