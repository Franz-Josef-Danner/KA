<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Generation Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #0066cc;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background-color: #0052a3;
    }
    .message {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
    }
    .success {
      background-color: #d4edda;
      color: #155724;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
    }
  </style>
</head>
<body>
  <h1>PDF Layout Spacing Test</h1>
  <p>This page tests the PDF generation with the new spacing fixes.</p>
  <p><strong>Expected behavior:</strong> Elements should use actual content height for spacing, not the configured box height.</p>
  
  <button id="generatePdfBtn">Generate Test PDF</button>
  
  <div id="message"></div>

  <script type="module">
    // Import PDF generator
    import { generatePDF, viewPDF } from './js/modules/pdf-generator.js';
    
    // Mock localStorage for settings
    const mockSettings = {
      companyName: 'Test Firma GmbH',
      address: 'Teststraße 123\n12345 Teststadt\nDeutschland',
      email: 'info@test-firma.de',
      phone: '+49 123 456789',
      logo: null,
      footerTextInvoice: 'Vielen Dank für Ihr Vertrauen!',
      footerTextOrder: 'Wir freuen uns auf die Zusammenarbeit!'
    };
    
    const mockLayoutTemplate = {
      elements: [
        {
          id: 'company-name',
          type: 'company-name',
          x: 20,
          y: 20,
          width: 200,
          height: 30
        },
        {
          id: 'company-address',
          type: 'company-address',
          x: 20,
          y: 60,
          width: 200,
          height: 80
        },
        {
          id: 'company-contact',
          type: 'company-contact',
          x: 20,
          y: 150,
          width: 200,
          height: 50
        },
        {
          id: 'customer-info',
          type: 'customer-info',
          x: 350,
          y: 20,
          width: 230,
          height: 100
        },
        {
          id: 'document-header',
          type: 'document-header',
          x: 20,
          y: 220,
          width: 560,
          height: 80  // Large box height, but should use actual content height
        },
        {
          id: 'items-table',
          type: 'items-table',
          x: 20,
          y: 320,
          width: 560,
          height: 300  // Large box height, but should use actual content height
        },
        {
          id: 'totals',
          type: 'totals',
          x: 400,
          y: 640,
          width: 180,
          height: 80
        },
        {
          id: 'footer',
          type: 'footer',
          x: 20,
          y: 740,
          width: 560,
          height: 60  // Large box height, but should use actual content height
        }
      ]
    };
    
    const sampleDocumentData = {
      invoiceId: 'RE-2026-001',
      invoiceDate: '06.01.2026',
      customer: {
        company: 'Kunde AG',
        contactPerson: 'Max Mustermann',
        address: 'Kundenstraße 456\n67890 Kundenstadt'
      },
      items: [
        {
          description: 'Webdesign',
          quantity: '1',
          unit: 'Stk',
          pricePerUnit: '1500.00',
          total: '1500.00'
        },
        {
          description: 'Backend-Entwicklung',
          quantity: '40',
          unit: 'Std',
          pricePerUnit: '85.00',
          total: '3400.00'
        },
        {
          description: 'Projektmanagement',
          quantity: '10',
          unit: 'Std',
          pricePerUnit: '95.00',
          total: '950.00'
        }
      ],
      subtotal: 5850.00,
      vat: 1111.50,
      total: 6961.50,
      vatRate: 0.19
    };
    
    // Set mock data in localStorage
    localStorage.setItem('ka_company_settings', JSON.stringify(mockSettings));
    localStorage.setItem('ka_pdf_layout_template', JSON.stringify(mockLayoutTemplate));
    
    document.getElementById('generatePdfBtn').addEventListener('click', async () => {
      const messageDiv = document.getElementById('message');
      messageDiv.textContent = 'Generating PDF...';
      messageDiv.className = 'message';
      
      try {
        const pdf = await generatePDF('invoice', sampleDocumentData, false, mockLayoutTemplate);
        
        if (pdf) {
          viewPDF(pdf);
          messageDiv.textContent = 'PDF generated successfully! Check the new window.';
          messageDiv.className = 'message success';
        } else {
          messageDiv.textContent = 'Failed to generate PDF.';
          messageDiv.className = 'message error';
        }
      } catch (error) {
        console.error('Error:', error);
        messageDiv.textContent = 'Error generating PDF: ' + error.message;
        messageDiv.className = 'message error';
      }
    });
  </script>
</body>
</html>
