<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>TeleTermin</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: auto; }
        label { display: block; margin-top: 10px; }
        input, textarea, button { width: 100%; box-sizing: border-box; margin-top: 5px; }
        textarea { resize: vertical; height: 100px; }
        .buttons { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <form id="teleTerminForm">
        <label for="TelefonBox">Telefonnummer:</label>
        <input type="tel" id="TelefonBox" name="TelefonBox" />

        <label for="FirmaBox">Firma:</label>
        <input type="text" id="FirmaBox" name="FirmaBox" />

        <label for="TerminPicker">Datum:</label>
        <input type="date" id="TerminPicker" name="TerminPicker" />

        <label for="AnrufZeitBox">Uhrzeit:</label>
        <input type="time" id="AnrufZeitBox" name="AnrufZeitBox" />

        <label for="KommentarBox">Kommentar:</label>
        <textarea id="KommentarBox" name="KommentarBox"></textarea>

        <input type="text" id="AnrufTerminBox" style="display:none;" />

        <div class="buttons">
            <button type="submit" id="AnrufOkButton">OK</button>
            <button type="button" id="CancelButton">Abbrechen</button>
        </div>
    </form>

    <script>
        document.getElementById('CancelButton').addEventListener('click', function () {
            document.getElementById('teleTerminForm').reset();
        });

        document.getElementById('teleTerminForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const date = document.getElementById('TerminPicker').value;
            const time = document.getElementById('AnrufZeitBox').value;
            document.getElementById('AnrufTerminBox').value = date + ' ' + time;
            alert('Termin gespeichert: ' + document.getElementById('AnrufTerminBox').value);
        });
        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || '';
        }

        document.addEventListener('DOMContentLoaded', function () {
            const tel = getParam('telefon');
            const firma = getParam('firma');
            if (tel) document.getElementById('TelefonBox').value = tel;
            if (firma) document.getElementById('FirmaBox').value = firma;
        });
    </script>
</body>
</html>
