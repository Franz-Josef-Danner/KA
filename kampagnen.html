<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kampagnen - KA System</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="nav-container"></div>
  
  <div class="page-container">
    <h1>Kampagnen</h1>
    <p class="page-subtitle">Verwalten Sie Ihre Marketing-Kampagnen</p>
    
    <div class="kampagnen-layout">
      <!-- Mail Interface Section -->
      <section class="mail-section">
        <h2>Nachricht erstellen</h2>
        <div id="mail-interface"></div>
      </section>
      
      <!-- Preview Section -->
      <section class="preview-section">
        <h2>E-Mail Vorschau</h2>
        <div id="preview-list"></div>
      </section>
    </div>
  </div>

  <script type="module">
    import { requireAuth } from './js/modules/auth.js';
    import { initNavigation } from './js/modules/navigation.js';
    
    (() => {
      try {
        // Require authentication; if this fails or redirects, do not continue
        requireAuth();

        // Initialize navigation only after successful authentication
        initNavigation('kampagnen.html');
      } catch (error) {
        // Authentication failed or a redirect is in progress; avoid further DOM manipulation
        console.error('Authentication error on kampagnen page:', error);
      }
    })();
  </script>
  
  <!-- Load the kampagnen application -->
  <script type="module" src="./js/kampagnen-app.js"></script>
</body>
</html>
