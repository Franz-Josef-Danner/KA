<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8" />
    <title>Stücke</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 10px; }
        label { display:block; margin-bottom:4px; }
        input[type="text"], textarea { width: 100%; padding: 4px; box-sizing:border-box; }
        roles { margin-top: 10px; max-height: 400px; overflow-y: auto; }
        .role-pair { border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; }
        .buttons { margin-top: 15px; }
    </style>
</head>
<body>
    <h1>Stücke</h1>
    <div class="form-group">
        <label for="NameBox">Stück Name</label>
        <input type="text" id="NameBox" />
    </div>
    <div class="form-group">
        <label for="FigCount">Figuren Anzahl:</label>
        <input type="number" id="FigCount" min="0" />
    </div>
    <div id="roleContainer" class="roles"></div>
    <div class="form-group">
        <label for="Beschreibung">Stück Beschreibung</label>
        <textarea id="Beschreibung" rows="5"></textarea>
    </div>
    <input type="hidden" id="RollenBox" />
    <input type="hidden" id="RollenBeschBox" />
    <div class="buttons">
        <button id="StueckeOK">OK</button>
        <button id="Abbrechen">Abbrechen</button>
    </div>
    <script src="Stuecke.js" defer></script>    
</body>
</html>
